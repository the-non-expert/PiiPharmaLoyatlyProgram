<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PiiPharma Loyalty Portal — Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Montserrat', sans-serif; background: #f8f9fb; color: #474545; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C = {
  primary:'#2372B9', primaryDark:'#1a5a99', primaryLight:'#e8f1fb',
  secondary:'#24AEB1', secondaryLight:'#e6f7f7',
  success:'#93CB52', successLight:'#f0f9e6',
  error:'#E53E3E', errorLight:'#fde8e8',
  warning:'#F59E0B', warningLight:'#fef3cd',
  body:'#474545', muted:'#686868', white:'#FFFFFF',
  surface:'#F4F6F8', border:'#EAEAEA',
};

// ── Primitives ─────────────────────────────────────────────
const Lbl = ({t}) => <div style={{fontSize:10,fontWeight:600,color:C.muted,fontFamily:'Montserrat',textTransform:'uppercase',letterSpacing:'0.08em',marginTop:6,textAlign:'center'}}>{t}</div>;
const Col = ({children,style}) => <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:4,...style}}>{children}</div>;
const Row = ({children,style}) => <div style={{display:'flex',flexWrap:'wrap',gap:12,alignItems:'flex-start',...style}}>{children}</div>;

function Section({id,num,title,children}) {
  return (
    <section id={id} style={{marginBottom:64}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24,paddingBottom:14,borderBottom:`2px solid ${C.border}`}}>
        <span style={{background:C.primary,color:'#fff',borderRadius:6,width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{num}</span>
        <h2 style={{fontSize:15,fontWeight:700,color:C.body,fontFamily:'Montserrat',letterSpacing:'0.04em',textTransform:'uppercase'}}>{title}</h2>
      </div>
      {children}
    </section>
  );
}

// ── Badge ──────────────────────────────────────────────────
function Badge({status}) {
  const m = {
    Pending: {bg:'#fef3cd',color:'#92640a',dot:'#F59E0B'},
    Approved:{bg:C.successLight,color:'#3d6e10',dot:C.success},
    Rejected:{bg:C.errorLight,color:'#9b2626',dot:C.error},
    Paid:    {bg:C.primaryLight,color:'#14407a',dot:C.primary},
  }[status];
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 12px',borderRadius:99,background:m.bg,color:m.color,fontSize:11,fontWeight:700,fontFamily:'Montserrat',whiteSpace:'nowrap'}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:m.dot,flexShrink:0}}/>
      {status}
    </span>
  );
}

// ── Buttons ────────────────────────────────────────────────
function Btn({variant='primary',size='md',state='default',fullWidth,children}) {
  const sz = {lg:{p:'13px 26px',fs:14,r:6},md:{p:'9px 18px',fs:13,r:6},sm:{p:'6px 13px',fs:11,r:4}}[size];
  const base = {fontFamily:'Montserrat',fontWeight:600,border:'2px solid transparent',cursor:state==='disabled'?'not-allowed':'pointer',display:'inline-flex',alignItems:'center',gap:7,transition:'all 0.15s',lineHeight:1.2,opacity:state==='disabled'?0.42:1,padding:sz.p,fontSize:sz.fs,borderRadius:sz.r,width:fullWidth?'100%':'auto',justifyContent:fullWidth?'center':'flex-start'};
  const v = {
    primary:    {background:state==='hover'?C.primaryDark:C.primary,color:'#fff',borderColor:state==='hover'?C.primaryDark:C.primary},
    secondary:  {background:state==='hover'?'#1d9699':C.secondary,color:'#fff',borderColor:state==='hover'?'#1d9699':C.secondary},
    ghost:      {background:state==='hover'?C.primaryLight:'transparent',color:C.primary,borderColor:C.primary},
    destructive:{background:state==='hover'?'#c53030':C.error,color:'#fff',borderColor:state==='hover'?'#c53030':C.error},
  }[variant];
  const Sp = () => <span style={{width:11,height:11,border:'2px solid rgba(255,255,255,0.35)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.7s linear infinite',display:'inline-block'}}/>;
  return <button style={{...base,...v}}>{state==='loading'&&<Sp/>}{children}</button>;
}

function ButtonsSection() {
  const variants = ['primary','secondary','ghost','destructive'];
  const states = ['default','hover','disabled','loading'];
  const sizes = ['lg','md','sm'];
  const labels = {primary:'Save',secondary:'Preview',ghost:'Cancel',destructive:'Delete'};
  return (
    <Section id="buttons" num="01" title="Buttons">
      {variants.map(v => (
        <div key={v} style={{marginBottom:28}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'capitalize',marginBottom:10,fontFamily:'Montserrat'}}>{v}</div>
          <Row style={{gap:32,alignItems:'flex-end'}}>
            {states.map(st=>(
              <Col key={st}>
                <Row style={{gap:8,alignItems:'flex-end'}}>
                  {sizes.map(sz=><Btn key={sz} variant={v} size={sz} state={st}>{labels[v]}</Btn>)}
                </Row>
                <Lbl t={st}/>
              </Col>
            ))}
          </Row>
        </div>
      ))}
    </Section>
  );
}

// ── Inputs ────────────────────────────────────────────────
function Input({label,state='default',prefix,placeholder}) {
  const ss = {
    default: {border:`2px solid ${C.border}`},
    focused: {border:`2px solid ${C.primary}`,boxShadow:`0 0 0 3px ${C.primaryLight}`},
    filled:  {border:`2px solid ${C.border}`},
    error:   {border:`2px solid ${C.error}`,boxShadow:`0 0 0 3px ${C.errorLight}`},
    disabled:{border:`2px solid ${C.border}`,background:C.surface},
  }[state];
  const val = state==='filled'?'Sample value':state==='error'?'Wrong input':'';
  return (
    <Col>
      <div style={{fontSize:11,fontWeight:600,color:C.body,fontFamily:'Montserrat',marginBottom:2}}>{label}</div>
      <div style={{display:'flex',alignItems:'stretch',width:210,borderRadius:6,background:state==='disabled'?C.surface:C.white,overflow:'hidden',...ss}}>
        {prefix&&<span style={{padding:'0 10px',fontSize:12,fontWeight:600,color:C.muted,borderRight:`1px solid ${C.border}`,display:'flex',alignItems:'center',background:C.surface,whiteSpace:'nowrap'}}>{prefix}</span>}
        <input readOnly value={val} placeholder={placeholder||`Enter ${label?.toLowerCase()||'value'}`} disabled={state==='disabled'}
          style={{flex:1,padding:'9px 11px',border:'none',outline:'none',fontFamily:'Montserrat',fontSize:12,color:C.body,background:'transparent',minWidth:0}}/>
        {state==='error'&&<span style={{padding:'0 10px',fontSize:13,color:C.error,display:'flex',alignItems:'center'}}>!</span>}
      </div>
      {state==='error'&&<div style={{fontSize:10,color:C.error,fontWeight:600,fontFamily:'Montserrat'}}>This field is required</div>}
      <Lbl t={state}/>
    </Col>
  );
}

function OtpInput({state='default'}) {
  return (
    <Col>
      <div style={{display:'flex',gap:7}}>
        {[...Array(6)].map((_,i)=>(
          <div key={i} style={{width:42,height:50,border:`2px solid ${state==='focused'&&i===2?C.primary:state==='error'?C.error:C.border}`,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,fontWeight:700,color:C.body,background:state==='disabled'?C.surface:C.white,boxShadow:state==='focused'&&i===2?`0 0 0 3px ${C.primaryLight}`:undefined,fontFamily:'Montserrat'}}>
            {state!=='default'&&state!=='focused'?(i<3?i+1:''):''}
          </div>
        ))}
      </div>
      {state==='error'&&<div style={{fontSize:10,color:C.error,fontWeight:600,fontFamily:'Montserrat'}}>Invalid OTP entered</div>}
      <Lbl t={state}/>
    </Col>
  );
}

function Textarea({state='default'}) {
  const ss = {
    default:{border:`2px solid ${C.border}`},
    focused:{border:`2px solid ${C.primary}`,boxShadow:`0 0 0 3px ${C.primaryLight}`},
    filled: {border:`2px solid ${C.border}`},
    error:  {border:`2px solid ${C.error}`,boxShadow:`0 0 0 3px ${C.errorLight}`},
    disabled:{border:`2px solid ${C.border}`,background:C.surface},
  }[state];
  const val = state==='filled'?'Prescription verified and approved for claim.':state==='error'?'Too short':'';
  return (
    <Col>
      <div style={{fontSize:11,fontWeight:600,color:C.body,fontFamily:'Montserrat',marginBottom:2}}>Notes</div>
      <textarea readOnly value={val} placeholder="Add notes…" disabled={state==='disabled'}
        style={{width:210,height:78,resize:'none',padding:'9px 11px',borderRadius:6,fontFamily:'Montserrat',fontSize:12,color:C.body,background:state==='disabled'?C.surface:C.white,outline:'none',...ss}}/>
      <Lbl t={state}/>
    </Col>
  );
}

function InputsSection() {
  const states = ['default','focused','filled','error','disabled'];
  return (
    <Section id="inputs" num="02" title="Input Fields">
      {[
        {label:'Text Input', comp: s => <Input key={s} label="Full Name" state={s}/>},
        {label:'Number Input', comp: s => <Input key={s} label="Quantity" state={s} placeholder="0"/>},
        {label:'Phone Input (+91)', comp: s => <Input key={s} label="Phone" state={s} prefix="+91" placeholder="98765 43210"/>},
        {label:'OTP Input (6-digit)', comp: s => <OtpInput key={s} state={s}/>},
        {label:'Textarea', comp: s => <Textarea key={s} state={s}/>},
      ].map(({label,comp})=>(
        <div key={label} style={{marginBottom:28}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:10,fontFamily:'Montserrat'}}>{label}</div>
          <Row style={{gap:20,alignItems:'flex-start'}}>{states.map(comp)}</Row>
        </div>
      ))}
    </Section>
  );
}

// ── Dropdown ──────────────────────────────────────────────
function Dropdown({state='default'}) {
  return (
    <Col>
      <div style={{position:'relative',width:190}}>
        <div style={{border:`2px solid ${state==='open'?C.primary:C.border}`,borderRadius:6,padding:'9px 12px',background:state==='disabled'?C.surface:C.white,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:state==='disabled'?'not-allowed':'pointer',boxShadow:state==='open'?`0 0 0 3px ${C.primaryLight}`:undefined,fontFamily:'Montserrat',fontSize:12,color:state==='default'?C.muted:C.body}}>
          <span>{state==='selected'||state==='open'?'North India Zone':'Select zone'}</span>
          <span style={{color:C.muted,fontSize:9,transform:state==='open'?'rotate(180deg)':'none',transition:'transform 0.2s'}}>▼</span>
        </div>
        {state==='open'&&(
          <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:C.white,border:`1px solid ${C.border}`,borderRadius:6,boxShadow:'0 8px 24px rgba(0,0,0,0.1)',zIndex:10,overflow:'hidden'}}>
            {['North India Zone','South India Zone','East India Zone','West India Zone'].map((o,i)=>(
              <div key={o} style={{padding:'9px 13px',fontSize:12,fontFamily:'Montserrat',color:i===0?C.primary:C.body,background:i===0?C.primaryLight:'transparent',fontWeight:i===0?600:400}}>{o}</div>
            ))}
          </div>
        )}
      </div>
      <Lbl t={state}/>
    </Col>
  );
}

// ── File Upload ───────────────────────────────────────────
function FileUpload({state='idle'}) {
  const cfgs = {
    idle:     {border:`2px dashed ${C.border}`,bg:C.white},
    dragover: {border:`2px dashed ${C.primary}`,bg:C.primaryLight},
    uploading:{border:`2px dashed ${C.secondary}`,bg:C.secondaryLight},
    uploaded: {border:`2px solid ${C.success}`,bg:C.successLight},
    error:    {border:`2px dashed ${C.error}`,bg:C.errorLight},
  }[state];
  return (
    <Col>
      <div style={{width:185,height:128,borderRadius:8,background:cfgs.bg,border:cfgs.border,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:7,cursor:'pointer',padding:14}}>
        {state==='idle'&&<><div style={{width:34,height:34,borderRadius:'50%',background:C.surface,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>☁</div><div style={{fontSize:11,color:C.muted,textAlign:'center',fontFamily:'Montserrat',fontWeight:600,lineHeight:1.4}}>Drop file or <span style={{color:C.primary}}>browse</span></div><div style={{fontSize:9,color:C.muted,fontFamily:'Montserrat'}}>PNG, JPG · max 5 MB</div></>}
        {state==='dragover'&&<><div style={{fontSize:22}}>📎</div><div style={{fontSize:12,color:C.primary,fontWeight:700,fontFamily:'Montserrat'}}>Drop to upload</div></>}
        {state==='uploading'&&<><div style={{fontSize:11,color:C.secondary,fontWeight:600,fontFamily:'Montserrat'}}>Uploading…</div><div style={{width:'80%',height:6,background:'rgba(0,0,0,0.08)',borderRadius:99}}><div style={{width:'60%',height:'100%',background:C.secondary,borderRadius:99}}/></div><div style={{fontSize:10,color:C.muted,fontFamily:'Montserrat'}}>60% complete</div></>}
        {state==='uploaded'&&<><div style={{width:48,height:48,background:'#ddeebb',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🖼</div><div style={{fontSize:10,color:C.success,fontWeight:700,fontFamily:'Montserrat'}}>receipt_001.jpg</div><div style={{fontSize:9,color:C.muted,fontFamily:'Montserrat'}}>Upload complete ✓</div></>}
        {state==='error'&&<><div style={{fontSize:22}}>⚠️</div><div style={{fontSize:11,color:C.error,fontWeight:700,fontFamily:'Montserrat'}}>Upload failed</div><div style={{fontSize:9,color:C.muted,fontFamily:'Montserrat',textAlign:'center'}}>File exceeds 5 MB limit</div></>}
      </div>
      <Lbl t={state}/>
    </Col>
  );
}

// ── Progress ──────────────────────────────────────────────
function ProgressBar({fill,label}) {
  const done = fill===100;
  return (
    <Col style={{width:360}}>
      <div style={{display:'flex',justifyContent:'space-between',width:'100%',marginBottom:5}}>
        <span style={{fontSize:12,fontWeight:600,color:C.body,fontFamily:'Montserrat'}}>{label}</span>
        <span style={{fontSize:12,fontWeight:700,color:done?C.success:C.primary,fontFamily:'Montserrat'}}>{fill}%</span>
      </div>
      <div style={{width:'100%',height:10,background:C.border,borderRadius:99,overflow:'hidden'}}>
        <div style={{width:`${fill}%`,height:'100%',background:done?C.success:C.primary,borderRadius:99}}/>
      </div>
      <Lbl t={done?'complete (5/5)':fill===60?'partial (3/5)':'started (1/5)'}/>
    </Col>
  );
}

// ── Cards ─────────────────────────────────────────────────
function ProductCard() {
  return (
    <div style={{width:196,background:C.white,borderRadius:8,border:`1px solid ${C.border}`,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
      <div style={{height:96,background:C.primaryLight,display:'flex',alignItems:'center',justifyContent:'center',borderBottom:`1px solid ${C.border}`}}>
        <div style={{width:56,height:56,background:C.border,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:C.muted,fontFamily:'Montserrat',textAlign:'center',fontWeight:600,lineHeight:1.4,padding:4}}>product<br/>image</div>
      </div>
      <div style={{padding:12}}>
        <div style={{fontSize:12,fontWeight:700,color:C.body,fontFamily:'Montserrat',marginBottom:2}}>Amoxicillin 500mg</div>
        <div style={{fontSize:10,color:C.muted,fontFamily:'Montserrat',marginBottom:8}}>SKU: AMX-500-10</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:15,fontWeight:700,color:C.primary,fontFamily:'Montserrat'}}>₹ 120</span>
          <Badge status="Approved"/>
        </div>
        <div style={{marginTop:9,background:C.successLight,borderRadius:4,padding:'4px 8px',fontSize:10,fontWeight:600,color:'#3d6e10',fontFamily:'Montserrat'}}>🎁 Earn 12 points</div>
      </div>
    </div>
  );
}

function ClaimCard() {
  return (
    <div style={{width:214,background:C.white,borderRadius:8,border:`1px solid ${C.border}`,padding:14,boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div><div style={{fontSize:11,fontWeight:700,color:C.body,fontFamily:'Montserrat'}}>Claim #CLM-2048</div><div style={{fontSize:10,color:C.muted,fontFamily:'Montserrat',marginTop:2}}>14 Apr 2025</div></div>
        <Badge status="Pending"/>
      </div>
      <div style={{background:C.surface,borderRadius:6,padding:8,marginBottom:10}}>
        <div style={{fontSize:10,color:C.muted,fontFamily:'Montserrat',marginBottom:4,fontWeight:600}}>Items claimed</div>
        <div style={{fontSize:11,color:C.body,fontFamily:'Montserrat',marginBottom:2}}>Amoxicillin 500mg × 5</div>
        <div style={{fontSize:11,color:C.body,fontFamily:'Montserrat'}}>Paracetamol 650mg × 10</div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:11,color:C.muted,fontFamily:'Montserrat'}}>Points earned</span>
        <span style={{fontSize:16,fontWeight:700,color:C.secondary,fontFamily:'Montserrat'}}>+240 pts</span>
      </div>
    </div>
  );
}

function StatCard({label,value,sub,color}) {
  return (
    <div style={{width:172,background:C.white,borderRadius:8,border:`1px solid ${C.border}`,padding:16,boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
      <div style={{fontSize:10,fontWeight:600,color:C.muted,fontFamily:'Montserrat',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</div>
      <div style={{fontSize:26,fontWeight:700,color:color||C.primary,fontFamily:'Montserrat',marginBottom:3}}>{value}</div>
      <div style={{fontSize:10,color:C.muted,fontFamily:'Montserrat'}}>{sub}</div>
      <div style={{marginTop:10,height:3,background:C.border,borderRadius:99}}><div style={{width:'68%',height:'100%',background:color||C.primary,borderRadius:99}}/></div>
    </div>
  );
}

// ── Nav ───────────────────────────────────────────────────
function MobileNav() {
  const tabs = [{icon:'🏠',label:'Home',active:true},{icon:'📋',label:'Claims'},{icon:'🎁',label:'Rewards'},{icon:'👤',label:'Profile'}];
  return (
    <div style={{width:350,background:C.white,borderTop:`1px solid ${C.border}`,display:'flex',borderRadius:'0 0 10px 10px',boxShadow:'0 -2px 12px rgba(0,0,0,0.07)'}}>
      {tabs.map(t=>(
        <div key={t.label} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 4px 10px',cursor:'pointer'}}>
          <div style={{fontSize:18,marginBottom:3}}>{t.icon}</div>
          <span style={{fontSize:10,fontWeight:t.active?700:600,color:t.active?C.primary:C.muted,fontFamily:'Montserrat'}}>{t.label}</span>
          {t.active&&<div style={{width:20,height:3,background:C.primary,borderRadius:99,marginTop:4}}/>}
        </div>
      ))}
    </div>
  );
}

function DesktopSidebar() {
  const items=[{icon:'📊',label:'Dashboard',active:true},{icon:'📋',label:'Claims Queue'},{icon:'👥',label:'Retailers'},{icon:'💊',label:'Products'},{icon:'📈',label:'Reports'},{icon:'⚙️',label:'Settings'}];
  return (
    <div style={{width:210,background:C.white,borderRadius:8,border:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,0.05)'}}>
      <div style={{padding:'16px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:9}}>
        <div style={{width:30,height:30,borderRadius:6,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',fontWeight:700}}>P</div>
        <div><div style={{fontSize:12,fontWeight:700,color:C.body,fontFamily:'Montserrat'}}>PiiPharma</div><div style={{fontSize:9,color:C.muted,fontFamily:'Montserrat'}}>Admin Portal</div></div>
      </div>
      <div style={{flex:1,padding:'6px 0'}}>
        {items.map(it=>(
          <div key={it.label} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 14px',cursor:'pointer',background:it.active?C.primaryLight:'transparent',borderLeft:it.active?`3px solid ${C.primary}`:'3px solid transparent'}}>
            <span style={{fontSize:14}}>{it.icon}</span>
            <span style={{fontSize:12,fontWeight:it.active?700:600,color:it.active?C.primary:C.body,fontFamily:'Montserrat'}}>{it.label}</span>
          </div>
        ))}
      </div>
      <div style={{padding:'10px 14px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:9}}>
        <div style={{width:28,height:28,borderRadius:'50%',background:C.secondary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#fff',fontWeight:700}}>AK</div>
        <div><div style={{fontSize:11,fontWeight:700,color:C.body,fontFamily:'Montserrat'}}>Anil Kumar</div><div style={{fontSize:9,color:C.muted,fontFamily:'Montserrat'}}>Super Admin</div></div>
      </div>
    </div>
  );
}

// ── Toasts ────────────────────────────────────────────────
function Toast({type}) {
  const m = {
    success:{bg:C.successLight,border:C.success,color:'#3d6e10',icon:'✓',title:'Success',msg:'Claim approved successfully.'},
    error:  {bg:C.errorLight,border:C.error,color:'#9b2626',icon:'✕',title:'Error',msg:'Failed to submit. Please try again.'},
    info:   {bg:C.primaryLight,border:C.primary,color:'#14407a',icon:'i',title:'Info',msg:'Points reflect within 24 hours.'},

        <Section id="table" num="12" title="Data Table Row">
          <DataTable/>
          <div style={{marginTop:7,fontSize:10,color:C.muted,fontFamily:'Montserrat',fontWeight:600}}>Row 2 shown in hover state · Row actions: view, approve, reject</div>
        </Section>

        <Section id="empty" num="13" title="Empty State">
          <EmptyState/>
        </Section>

        <Section id="skeleton" num="14" title="Loading Skeleton">
          <Row style={{gap:28,alignItems:'flex-start'}}>
            <Col><CardSkeleton/><Lbl t="Card Skeleton"/></Col>
            <Col><div style={{width:500}}><ListSkeleton/></div><Lbl t="List Row Skeleton"/></Col>
          </Row>
        </Section>

        <Section id="otp" num="15" title="OTP Timer / Resend">
          <Row style={{gap:28}}>
            <Col><OtpTimer mode="countdown"/><Lbl t="Countdown active"/></Col>
            <Col><OtpTimer mode="resend"/><Lbl t="Resend active"/></Col>
          </Row>
        </Section>

        <div style={{height:48}}/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
