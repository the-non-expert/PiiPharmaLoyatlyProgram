<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 430" width="100%">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Step 1: Retailer logs in -->
  <rect x="145" y="14" width="170" height="46" rx="23" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="230" y="42" text-anchor="middle" font-family="Arial" font-size="12" font-weight="700" fill="#065F46">Retailer logs in</text>

  <!-- Arrow down -->
  <line x1="230" y1="60" x2="230" y2="82" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Selects product -->
  <rect x="120" y="84" width="220" height="52" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="106" text-anchor="middle" font-family="Arial" font-size="12" font-weight="700" fill="#1E3A5F">Selects product</text>
  <text x="230" y="124" text-anchor="middle" font-family="Arial" font-size="10" fill="#1E3A5F">System shows coupons required</text>

  <!-- Arrow down -->
  <line x1="230" y1="136" x2="230" y2="158" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Uploads photo -->
  <rect x="110" y="160" width="240" height="52" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="182" text-anchor="middle" font-family="Arial" font-size="12" font-weight="700" fill="#1E3A5F">Uploads coupon photo</text>
  <text x="230" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#1E3A5F">Enters serial number(s)</text>

  <!-- Arrow down -->
  <line x1="230" y1="212" x2="230" y2="234" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond: Serial already used? -->
  <!-- Diamond center at (230, 284). Points: top(230,244), right(320,284), bottom(230,324), left(140,284) -->
  <polygon points="230,244 320,284 230,324 140,284" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="230" y="279" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#78350F">Serial number</text>
  <text x="230" y="295" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#78350F">already used?</text>

  <!-- Yes branch (left) -->
  <line x1="140" y1="284" x2="75" y2="284" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="75" y1="284" x2="75" y2="348" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="112" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B7280">Yes</text>

  <!-- No branch (right) -->
  <line x1="320" y1="284" x2="385" y2="284" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="385" y1="284" x2="385" y2="348" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="352" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B7280">No</text>

  <!-- Rejected box -->
  <rect x="10" y="350" width="130" height="50" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="75" y="371" text-anchor="middle" font-family="Arial" font-size="11.5" font-weight="700" fill="#7F1D1D">Claim</text>
  <text x="75" y="389" text-anchor="middle" font-family="Arial" font-size="10.5" fill="#7F1D1D">auto-rejected</text>

  <!-- Admin queue box -->
  <rect x="315" y="350" width="140" height="50" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="385" y="371" text-anchor="middle" font-family="Arial" font-size="11.5" font-weight="700" fill="#065F46">Enters admin</text>
  <text x="385" y="389" text-anchor="middle" font-family="Arial" font-size="10.5" fill="#065F46">review queue</text>
</svg>
